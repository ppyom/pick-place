name: ✨ 기능 요청
description: 새로운 기능이나 개선 아이디어를 제안합니다.
title: '[Feature] '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: 해결하고 싶은 문제
      description: 어떤 불편함/필요성에서 나온 아이디어인가요?
    validations:
      required: false

  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 어떤 기능을 만들고 싶은지 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안
      description: 고려해본 다른 방법이 있다면 적어주세요.
    validations:
      required: false

  - type: textarea
    id: checklist
    attributes:
      label: 체크리스트
      description: 이 작업에서 완료해야 할 항목들을 나열해주세요. 필요에 맞게 자유롭게 수정/추가하세요.
      value: |
        - [ ] 컴포넌트/기능 구현
        - [ ] stories.tsx 작성
        - [ ] docs.mdx 작성
        - [ ] 필요한 경우 테스트 작성
    validations:
      required: false
