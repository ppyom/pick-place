name: ✨ 기능 요청
description: 새로운 기능이나 개선 아이디어를 제안합니다.
title: '✨ '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: 해결하고 싶은 문제
      description: 어떤 불편함/필요성에서 나온 아이디어인가요?
    validations:
      required: false

  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 어떤 기능을 만들고 싶은지 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안
      description: 고려해본 다른 방법이 있다면 적어주세요.
    validations:
      required: false
