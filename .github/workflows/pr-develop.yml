name: 'CI (feature → develop)'

on:
  pull_request:
    branches: [develop]

jobs:
  lint-and-unit:
    name: 린트 & 유닛 테스트
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 린트 검사
        run: npm run lint

      - name: 유닛 테스트
        run: npm run test:unit
